name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit & E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Vitest
        id: vitest
        run: pnpm test:coverage

      - name: Playwright
        id: playwright
        run: pnpm test:e2e
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            playwright-report/
            test-results/
            coverage/
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "## Test results" >> $GITHUB_STEP_SUMMARY
          echo "- Vitest outcome: ${{ steps.vitest.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright outcome: ${{ steps.playwright.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Failures do not block this workflow (report-only mode)._" >> $GITHUB_STEP_SUMMARY

  analyze:
    name: Fallow analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: fallow-rs/fallow@v2
        with:
          format: sarif
